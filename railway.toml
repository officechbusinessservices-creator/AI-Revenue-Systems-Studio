# =============================================================================
# Railway / Railpack build configuration — CompliCore
# Docs: https://docs.railway.com/reference/config-as-code
# =============================================================================

[build]
# Install from the pinned lock file instead of the loose requirements.txt.
# This eliminates pip's dependency-resolution backtracking (grpcio / grpcio-tools
# / googleapis-common-protos) and cuts build time from 10+ min to < 2 min.
builder = "railpack"
buildCommand = "pip install --no-deps -r requirements.lock"

[deploy]
startCommand = "python main.py"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
pip install pip-tools
pip-compile requirements.in  # or whatever your source file is
git commit -am "Fix: regenerate requirements.lock"
git push

